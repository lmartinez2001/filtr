name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    name: CPU unit tests
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
          cache: pip

      - name: Install CPU test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            torch==1.12.0+cpu \
            torchvision==0.13.0+cpu \
            --find-links https://download.pytorch.org/whl/torch_stable.html
          python -m pip install \
            pytest \
            hydra-core \
            numpy \
            packaging \
            scipy \
            matplotlib \
            pyyaml \
            tqdm \
            easydict \
            tensorboardX \
            timm==0.4.5 \
            transforms3d \
            termcolor \
            huggingface_hub \
            gdown

      - name: Compile Python sources
        run: |
          python -m compileall \
            train.py \
            engine.py \
            datasets \
            models \
            preprocess \
            tests \
            util

      - name: Run tests
        run: python -m pytest -q tests
